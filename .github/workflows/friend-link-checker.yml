name: 🤝 友链申请自动处理

on:
  issues:
    types: [opened, edited]

jobs:
  process-friend-request:
    if: contains(github.event.issue.title, '友链申请')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提取 Issue 内容
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"
          echo "=== Issue Body ==="
          echo "$BODY"
          echo "=================="
          
          python3 << 'PYEOF'
          import os, re
          
          body = os.environ.get("BODY", "")
          
          def extract(key):
              pattern = r'### ' + key + r'\s*\n\s*(.*?)(?=\n###|\Z)'
              m = re.search(pattern, body, re.DOTALL)
              if m:
                val = m.group(1).strip()
                if val == "No response":
                  return ""
                return val.strip('`')
              return ""
          
          print(f"name=[{extract('网站名称')}]")
          print(f"desc=[{extract('网站描述')}]")
          print(f"url=[{extract('网站链接')}]")
          print(f"avatar=[{extract('网站头像 URL')}]")
          print(f"friend_url=[{extract('友链页面 URL')}]")
          
          with open('/tmp/extracted.txt', 'w') as f:
            f.write(f"name={extract('网站名称')}\n")
            f.write(f"desc={extract('网站描述')}\n")
            f.write(f"url={extract('网站链接')}\n")
            f.write(f"avatar={extract('网站头像 URL')}\n")
            f.write(f"friend_url={extract('友链页面 URL')}\n")
          PYEOF
          
          cat /tmp/extracted.txt >> $GITHUB_OUTPUT

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 创建验证脚本
        run: |
          cat > verify.cjs << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const https = require('https');
          const http = require('http');

          async function checkConnectivity(url) {
            return new Promise((resolve) => {
              const client = url.startsWith('https') ? https : http;
              const req = client.get(url, { timeout: 10000 }, (res) => {
                resolve({ ok: res.statusCode >= 200 && res.statusCode < 400, status: res.statusCode });
                res.resume();
              });
              req.on('error', (e) => resolve({ ok: false, status: 0, error: e.message }));
              req.on('timeout', () => { req.destroy(); resolve({ ok: false, status: 0, error: 'timeout' }); });
            });
          }

          async function verify() {
            const siteUrl = process.env.SITE_URL || '';
            let verifyUrl = process.env.FRIEND_URL || '';
            if (verifyUrl) verifyUrl = verifyUrl.trim();
            if (siteUrl) {
              const trimmed = siteUrl.trim();
              if (!verifyUrl) verifyUrl = trimmed;
            }

            const result = {
              site_url: siteUrl,
              friend_url: verifyUrl,
              connectivity: null,
              friend_link_check: null,
              overall: 'fail'
            };

            if (!verifyUrl) {
              console.error('错误: 未提供验证 URL');
              fs.writeFileSync('/tmp/verify_result.json', JSON.stringify(result));
              return;
            }

            console.log('1. 连通性测试:', verifyUrl);
            const connResult = await checkConnectivity(verifyUrl);
            result.connectivity = connResult;
            console.log('   状态:', connResult.ok ? '可达' : '不可达', connResult.error || '');

            if (!connResult.ok) {
              console.log('连通性测试失败，跳过友链验证');
              fs.writeFileSync('/tmp/verify_result.json', JSON.stringify(result, null, 2));
              return;
            }

            console.log('2. 友链验证');
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();

            try {
              await page.goto(verifyUrl, { 
                waitUntil: 'domcontentloaded',
                timeout: 30000 
              });

              const content = await page.content();
              const actualUrl = page.url();
              console.log('   实际访问地址:', actualUrl);

              const allLinks = await page.evaluate(() => {
                return Array.from(document.querySelectorAll('a[href]')).map(a => a.href);
              });
              const linksText = allLinks.join('\n');

              const found = content.toLowerCase().includes('upxuu.com') || linksText.toLowerCase().includes('upxuu.com');
              result.friend_link_check = { found, actual_url: actualUrl };
              console.log('   结果:', found ? '✅ 找到 upxuu.com' : '❌ 未找到 upxuu.com');
            } catch (error) {
              console.error('   访问失败:', error.message);
              result.friend_link_check = { found: false, error: error.message };
            } finally {
              await browser.close();
            }

            result.overall = (connResult.ok && result.friend_link_check?.found) ? 'pass' : 'fail';
            fs.writeFileSync('/tmp/verify_result.json', JSON.stringify(result, null, 2));
            console.log('最终结果:', result.overall);
          }

          verify();
          EOF

      - name: 验证友链
        id: verify
        run: node verify.cjs
        env:
          SITE_URL: ${{ steps.extract.outputs.url }}
          FRIEND_URL: ${{ steps.extract.outputs.friend_url }}

      - name: 读取验证结果
        id: result
        run: |
          if [ -f /tmp/verify_result.json ]; then
            cat /tmp/verify_result.json
            OVERALL=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/verify_result.json','utf-8'));console.log(r.overall)")
            echo "overall=$OVERALL" >> $GITHUB_OUTPUT
            echo "raw=$(base64 -w0 /tmp/verify_result.json)" >> $GITHUB_OUTPUT
          else
            echo "overall=fail" >> $GITHUB_OUTPUT
          fi

      - name: 更新友链配置文件 (验证通过)
        if: steps.result.outputs.overall == 'pass'
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json, sys
          
          with open('public/data/friends.json', 'r', encoding='utf-8') as f:
            friends = json.load(f)
          
          name = """${{ steps.extract.outputs.name }}"""
          url = """${{ steps.extract.outputs.url }}"""
          
          for friend in friends:
            if friend['url'].rstrip('/') == url.rstrip('/'):
              print(f"友链已存在: {url}")
              sys.exit(0)
          
          new_friend = {
            "name": name,
            "url": url,
            "avatar": """${{ steps.extract.outputs.avatar }}""",
            "description": """${{ steps.extract.outputs.desc }}"""
          }
          friends.append(new_friend)
          
          with open('public/data/friends.json', 'w', encoding='utf-8') as f:
            json.dump(friends, f, ensure_ascii=False, indent=2)
          
          print("✅ 友链已添加")
          PYTHON_SCRIPT

      - name: 提交并推送 (验证通过)
        if: steps.result.outputs.overall == 'pass'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/friends.json
          
          if ! git diff --cached --quiet; then
            git commit -m "feat: 添加友链 ${{ steps.extract.outputs.name }}"
            git push
            echo "✅ 已提交并推送"
          else
            echo "友链已存在，无需更新"
          fi

      - name: 回复 Issue - 验证通过并关闭
        if: steps.result.outputs.overall == 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            const r = JSON.parse(Buffer.from(`${{ steps.result.outputs.raw }}`, 'base64').toString('utf-8'));
            const body = `## ✅ 友链申请已通过！
            
            感谢申请！友链已成功添加到列表中。
            
            📋 **友链信息**
            - 名称：${{ steps.extract.outputs.name }}
            - 链接：${{ steps.extract.outputs.url }}
            
            🔍 **验证结果**
            - 连通性测试：✅ 可达
            - 友链验证：✅ 已找到 upxuu.com
            
            ⚡ Vercel 将自动重新部署，几分钟内更新生效。
            
            感谢支持！🎉`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });

      - name: 回复 Issue - 验证失败
        if: steps.result.outputs.overall == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            const r = JSON.parse(Buffer.from(`${{ steps.result.outputs.raw }}`, 'base64').toString('utf-8'));
            const connStatus = r.connectivity?.ok ? '✅ 可达' : `❌ 不可达 (${r.connectivity?.error || '连接超时'})`;
            const linkStatus = r.friend_link_check?.found ? '✅ 已找到 upxuu.com' : `❌ 未找到 upxuu.com`;
            
            let body = `## ❌ 友链申请未通过
            
            🔍 **验证结果**
            - 连通性测试：${connStatus}
            - 友链验证：${linkStatus}
            - 检测地址：${r.friend_url || r.site_url}
            
            📝 **请检查以下事项**
            - 确保网站可以正常访问
            - 在友链页面添加本站信息：
              - 名称: UpXuu
              - 链接: https://upxuu.com
              - 头像: https://upxuu.com/images/20260214145619.jpg
            
            修改完成后，请**编辑此 Issue** 触发重新验证。`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['需处理']
            });
