name: 🤝 友链申请自动处理

on:
  issues:
    types: [opened, edited]

jobs:
  process-friend-request:
    if: contains(github.event.issue.title, '友链申请')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提取 Issue 内容
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"
          echo "$BODY"
          
          NAME=$(echo "$BODY" | grep -A1 '### 网站名称' | tail -1 | sed 's/^ *//;s/\r$//')
          DESC=$(echo "$BODY" | grep -A1 '### 网站描述' | tail -1 | sed 's/^ *//;s/\r$//')
          URL=$(echo "$BODY" | grep -A1 '### 网站链接' | tail -1 | sed 's/^ *//;s/\r$//')
          AVATAR=$(echo "$BODY" | grep -A1 '### 网站头像 URL' | tail -1 | sed 's/^ *//;s/\r$//')
          
          NAME=$(echo "$NAME" | sed 's/^`//;s/`$//')
          DESC=$(echo "$DESC" | sed 's/^`//;s/`$//')
          URL=$(echo "$URL" | sed 's/^`//;s/`$//')
          AVATAR=$(echo "$AVATAR" | sed 's/^`//;s/`$//')
          
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "avatar=$AVATAR" >> $GITHUB_OUTPUT
          echo "Issue 内容: 名称=$NAME, 描述=$DESC, 链接=$URL, 头像=$AVATAR"

      - name: 安装 Playwright
        run: |
          rm -rf node_modules package-lock.json
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 创建验证脚本
        run: |
          cat > verify.js << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          async function verify() {
            const url = process.env.SITE_URL;
            
            if (!url) {
              console.error('错误: 未提供网站 URL');
              fs.writeFileSync('/tmp/verify_result', 'fail');
              return;
            }

            console.log('正在检查:', url);

            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            try {
              await page.goto(url, { 
                waitUntil: 'domcontentloaded',
                timeout: 30000 
              });

              const content = await page.content();

              if (content.toLowerCase().includes('upxuu.com')) {
                console.log('✅ 验证通过：找到 upxuu.com');
                fs.writeFileSync('/tmp/verify_result', 'pass');
              } else {
                console.log('❌ 验证失败：未找到 upxuu.com');
                fs.writeFileSync('/tmp/verify_result', 'fail');
              }
            } catch (error) {
              console.error('访问失败:', error.message);
              fs.writeFileSync('/tmp/verify_result', 'fail');
            } finally {
              await browser.close();
            }
          }

          verify();
          EOF

      - name: 验证友链
        id: verify
        run: node verify.js
        env:
          SITE_URL: ${{ steps.extract.outputs.url }}

      - name: 更新友链配置文件 (验证通过)
        if: steps.verify.outputs.result == 'pass'
        run: |
          NAME="${{ steps.extract.outputs.name }}"
          DESC="${{ steps.extract.outputs.desc }}"
          URL="${{ steps.extract.outputs.url }}"
          AVATAR="${{ steps.extract.outputs.avatar }}"
          
          echo "添加友链: $NAME - $URL"
          
          python3 << 'PYTHON_SCRIPT'
          import json
          import sys
          
          with open('public/data/friends.json', 'r', encoding='utf-8') as f:
            friends = json.load(f)
          
          name = """${{ steps.extract.outputs.name }}"""
          url = """${{ steps.extract.outputs.url }}"""
          
          for friend in friends:
            if friend['url'].rstrip('/') == url.rstrip('/'):
              print(f"友链已存在: {url}")
              sys.exit(0)
          
          new_friend = {
            "name": name,
            "url": url,
            "avatar": """${{ steps.extract.outputs.avatar }}""",
            "description": """${{ steps.extract.outputs.desc }}"""
          }
          friends.append(new_friend)
          
          with open('public/data/friends.json', 'w', encoding='utf-8') as f:
            json.dump(friends, f, ensure_ascii=False, indent=2)
          
          print("✅ 友链已添加")
          PYTHON_SCRIPT

      - name: 提交并推送 (验证通过)
        if: steps.verify.outputs.result == 'pass'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/friends.json
          
          if ! git diff --cached --quiet; then
            git commit -m "feat: 添加友链 ${{ steps.extract.outputs.name }}"
            git push
            echo "✅ 已提交并推送"
          else
            echo "友链已存在，无需更新"
          fi

      - name: 回复 Issue - 验证通过
        if: steps.verify.outputs.result == 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ 友链申请已通过！
              
              感谢申请！友链已成功添加到列表中。
              
              📋 **友链信息**
              - 名称：${{ steps.extract.outputs.name }}
              - 链接：${{ steps.extract.outputs.url }}
              
              ⚡ Vercel 将自动重新部署，几分钟内更新生效。
              
              感谢支持！🎉`
            })

      - name: 回复 Issue - 验证失败
        if: steps.verify.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ 友链申请需要修改
              
              在你的网站中未找到 \`upxuu.com\`。
              
              📝 **请先在你的网站添加本站友链**
              
              本站信息：
              - **名称**: UpXuu
              - **链接**: https://upxuu.com
              - **头像**: https://upxuu.com/images/20260214145619.jpg
              
              添加完成后，请**编辑此 Issue** 触发重新验证。
              
              如有疑问，欢迎在评论区交流！🤝`
            })
