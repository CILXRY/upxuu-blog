name: 🤝 友链申请自动处理

on:
  issues:
    types: [opened, edited]

jobs:
  process-friend-request:
    if: contains(github.event.issue.title, '友链申请')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提取 Issue 内容
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"
          echo "$BODY"
          
          # 提取网站名称
          NAME=$(echo "$BODY" | grep -A1 '### 网站名称' | tail -1 | sed 's/^ *//;s/\r$//')
          # 提取网站描述
          DESC=$(echo "$BODY" | grep -A1 '### 网站描述' | tail -1 | sed 's/^ *//;s/\r$//')
          # 提取网站链接
          URL=$(echo "$BODY" | grep -A1 '### 网站链接' | tail -1 | sed 's/^ *//;s/\r$//')
          # 提取头像 URL
          AVATAR=$(echo "$BODY" | grep -A1 '### 网站头像 URL' | tail -1 | sed 's/^ *//;s/\r$//')
          # 提取友链页面 URL
          FRIEND_URL=$(echo "$BODY" | grep -A1 '### 友链页面 URL' | tail -1 | sed 's/^ *//;s/\r$//')
          
          # 去除可能的引号
          NAME=$(echo "$NAME" | sed 's/^`//;s/`$//')
          DESC=$(echo "$DESC" | sed 's/^`//;s/`$//')
          URL=$(echo "$URL" | sed 's/^`//;s/`$//')
          AVATAR=$(echo "$AVATAR" | sed 's/^`//;s/`$//')
          FRIEND_URL=$(echo "$FRIEND_URL" | sed 's/^`//;s/`$//')
          
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "avatar=$AVATAR" >> $GITHUB_OUTPUT
          echo "friend_url=$FRIEND_URL" >> $GITHUB_OUTPUT
          echo "Issue 内容: 名称=$NAME, 描述=$DESC, 链接=$URL, 头像=$AVATAR, 友链页=$FRIEND_URL"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Playwright 依赖
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 创建验证脚本
        run: |
          cat > verify-friend-link.js << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          async function verifyFriendLink() {
            const friendUrl = process.env.FRIEND_URL;
            
            if (!friendUrl) {
              console.error('错误: 未提供友链 URL');
              fs.writeFileSync('/tmp/verify_result', 'fail');
              return;
            }

            console.log('正在使用真实浏览器检查:', friendUrl);

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 }
            });

            const page = await context.newPage();

            try {
              await page.goto(friendUrl, { 
                waitUntil: 'networkidle',
                timeout: 30000 
              });

              await page.waitForTimeout(3000);

              const content = await page.content();

              const links = await page.evaluate(() => {
                return Array.from(document.querySelectorAll('a')).map(a => a.href);
              });

              const allContent = content + '\n' + links.join('\n');

              console.log('页面标题:', await page.title());
              console.log('页面 URL:', page.url());

              if (allContent.toLowerCase().includes('upxuu.com')) {
                console.log('✅ 验证通过：找到 upxuu.com');
                fs.writeFileSync('/tmp/verify_result', 'pass');
              } else {
                console.log('❌ 验证失败：未找到 upxuu.com');
                console.log('页面内容预览:', content.substring(0, 500));
                fs.writeFileSync('/tmp/verify_result', 'fail');
              }
            } catch (error) {
              console.error('浏览器访问失败:', error.message);
              fs.writeFileSync('/tmp/verify_result', 'fail');
            } finally {
              await browser.close();
            }
          }

          verifyFriendLink();
          EOF

      - name: 使用真实浏览器验证友链页面
        id: verify
        run: |
          echo "当前目录: $(pwd)"
          echo "node_modules 是否存在: $(ls -d node_modules 2>/dev/null || echo '不存在')"
          echo "playwright 是否存在: $(ls node_modules/playwright 2>/dev/null || echo '不存在')"
          node verify-friend-link.js
          RESULT=$(cat /tmp/verify_result)
          echo "result=$RESULT" >> $GITHUB_OUTPUT
        env:
          FRIEND_URL: ${{ steps.extract.outputs.friend_url }}

      - name: 更新友链配置文件 (验证通过)
        if: steps.verify.outputs.result == 'pass'
        run: |
          NAME="${{ steps.extract.outputs.name }}"
          DESC="${{ steps.extract.outputs.desc }}"
          URL="${{ steps.extract.outputs.url }}"
          AVATAR="${{ steps.extract.outputs.avatar }}"
          
          echo "添加友链: $NAME - $URL"
          
          # 使用 Python 更新 JSON
          python3 << 'PYTHON_SCRIPT'
          import json
          import sys
          
          with open('public/data/friends.json', 'r', encoding='utf-8') as f:
            friends = json.load(f)
          
          # 检查是否已存在
          name = """${{ steps.extract.outputs.name }}"""
          url = """${{ steps.extract.outputs.url }}"""
          
          for friend in friends:
            if friend['url'].rstrip('/') == url.rstrip('/'):
              print(f"友链已存在: {url}")
              sys.exit(0)
          
          # 添加新友链
          new_friend = {
            "name": name,
            "url": url,
            "avatar": """${{ steps.extract.outputs.avatar }}""",
            "description": """${{ steps.extract.outputs.desc }}"""
          }
          friends.append(new_friend)
          
          with open('public/data/friends.json', 'w', encoding='utf-8') as f:
            json.dump(friends, f, ensure_ascii=False, indent=2)
          
          print("✅ 友链已添加")
          PYTHON_SCRIPT

      - name: 提交并推送 (验证通过)
        if: steps.verify.outputs.result == 'pass'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/friends.json
          
          if ! git diff --cached --quiet; then
            git commit -m "feat: 添加友链 ${{ steps.extract.outputs.name }}"
            git push
            echo "✅ 已提交并推送"
          else
            echo "友链已存在，无需更新"
          fi

      - name: 回复 Issue - 验证通过
        if: steps.verify.outputs.result == 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ 友链申请已通过！
              
              感谢申请！友链已成功添加到列表中。
              
              📋 **友链信息**
              - 名称：${{ steps.extract.outputs.name }}
              - 链接：${{ steps.extract.outputs.url }}
              
              ⚡ Vercel 将自动重新部署，几分钟内更新生效。
              
              感谢支持！🎉`
            })

      - name: 回复 Issue - 验证失败
        if: steps.verify.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ 友链申请需要修改
              
              经真实浏览器检查，在你的友链页面中未找到 \`upxuu.com\`。
              
              🔍 **验证信息**
              - 友链页面：${{ steps.extract.outputs.friend_url }}
              - 验证方式：真实浏览器访问（Playwright）
              - 验证结果：未找到 \`upxuu.com\`
              
              📝 **请按以下步骤操作**
              
              1. 在你的网站友链页面添加本站信息：
                 - **名称**: UpXuu
                 - **链接**: https://upxuu.com
                 - **头像**: https://upxuu.com/images/20260214145619.jpg
              
              2. 确保友链页面可以正常访问
              
              3. 修改完成后，请**编辑此 Issue** 触发重新验证
              
              如有疑问，欢迎在评论区交流！🤝`
            })
