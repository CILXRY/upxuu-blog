name: 🤝 自动更新友链

on:
  issues:
    types: [opened]

jobs:
  update-friends:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 解析 Issue 并验证友链
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const https = require('https');
            const http = require('http');
            const { chromium } = require('playwright');

            const issue = context.payload.issue;
            const body = issue.body || '';

            // 检查是否来自友链申请模板
            if (!body.includes('### 网站名称') || !body.includes('### 网站链接')) {
              console.log('非友链申请 issue，跳过');
              return;
            }

            function extractField(name, text) {
              const regex = new RegExp(`### ${name}\\s*\\n([^#]+)`, 'i');
              const match = text.match(regex);
              return match ? match[1].trim() : null;
            }

            const name = extractField('网站名称', body);
            const description = extractField('网站描述', body);
            const url = extractField('网站链接', body);
            const avatar = extractField('网站头像 URL', body) || '';
            const friendUrl = extractField('友链页面 URL', body);

            if (!name || !url) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ 友链信息不完整，请确保填写了网站名称和网站链接。'
              });
              return;
            }

            const cleanUrl = url.replace(/\/$/, '');
            const cleanAvatar = avatar ? avatar.trim() : '';

            // 第一步：测试连通性
            function checkConnectivity(targetUrl) {
              return new Promise((resolve) => {
                const client = targetUrl.startsWith('https') ? https : http;
                const req = client.get(targetUrl, { timeout: 10000 }, (res) => {
                  resolve({ ok: res.statusCode >= 200 && res.statusCode < 400, status: res.statusCode });
                  res.resume();
                });
                req.on('error', (e) => resolve({ ok: false, status: 0, error: e.message }));
                req.on('timeout', () => { req.destroy(); resolve({ ok: false, status: 0, error: '请求超时' }); });
              });
            }

            console.log(`正在测试连通性: ${cleanUrl}`);
            const conn = await checkConnectivity(cleanUrl);

            if (!conn.ok) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ 友链验证失败：**${name}**\n\n**失败原因**：网站无法访问 (${cleanUrl})\n- 状态码: ${conn.status || '无'}\n- 错误: ${conn.error}\n\n请确认网站是否可以正常访问。`
              });
              return;
            }

            // 第二步：用 Playwright 检查友链页面
            console.log(`正在检查友链: ${cleanUrl}`);
            const browser = await chromium.launch({ headless: true });
            const context_browser = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context_browser.newPage();
            
            let hasFriendLink = false;
            let actualUrl = cleanUrl;

            try {
              await page.goto(cleanUrl, { waitUntil: 'domcontentloaded', timeout: 30000 });
              actualUrl = page.url();

              const content = await page.content();
              
              const allLinks = await page.evaluate(() => {
                return Array.from(document.querySelectorAll('a[href]')).map(a => a.href);
              });

              const linkText = allLinks.join('\n').toLowerCase();
              const contentLower = content.toLowerCase();

              hasFriendLink = contentLower.includes('upxuu.com') || linkText.includes('upxuu.com');

            } catch (e) {
              hasFriendLink = false;
            } finally {
              await browser.close();
            }

            if (!hasFriendLink) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ 友链验证失败：**${name}**\n\n**失败原因**：未在网站中找到本站友链 (${actualUrl})\n\n请先在你的网站添加本站友链：\n- 名称: UpXuu\n- 链接: https://upxuu.com\n- 头像: https://upxuu.com/images/20260214145619.jpg\n- 描述: 逐光而上`
              });
              return;
            }

            // 第三步：验证通过，更新 friends.json
            const friendsPath = path.join('myblog', 'public', 'data', 'friends.json');
            let friends = [];
            
            if (fs.existsSync(friendsPath)) {
              friends = JSON.parse(fs.readFileSync(friendsPath, 'utf-8'));
            }

            const existingIndex = friends.findIndex(f => f.url.replace(/\/$/, '') === cleanUrl);
            
            if (existingIndex !== -1) {
              friends[existingIndex] = {
                name: name,
                url: cleanUrl,
                avatar: cleanAvatar,
                description: description || ''
              };
            } else {
              friends.push({
                name: name,
                url: cleanUrl,
                avatar: cleanAvatar,
                description: description || ''
              });
            }

            fs.writeFileSync(friendsPath, JSON.stringify(friends, null, 2) + '\n');

            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git add ${friendsPath}`);
            execSync(`git commit -m "🤝 更新友链: ${name} [skip ci]"`);
            execSync('git push');

            const action = existingIndex !== -1 ? '更新' : '添加';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ 友链验证通过，已成功${action}友链：**${name}**\n\n**友链信息**：\n- 名称: ${name}\n- 链接: ${cleanUrl}\n- 描述: ${description || '无'}\n- 头像: ${cleanAvatar || '无'}\n\n友链已更新到 [friends.json](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/${friendsPath})。`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });
