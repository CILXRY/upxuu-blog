name: 🤝 友链申请自动处理

on:
  issues:
    types: [opened, edited]

jobs:
  process-friend-request:
    if: contains(github.event.issue.title, '友链申请')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提取 Issue 内容
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"
          echo "=== Issue Body ==="
          echo "$BODY"
          echo "=================="
          
          extract_value() {
            local key="$1"
            echo "$BODY" | awk "/### $key/{getline; getline; getline; getline; gsub(/^\r/, \"\"); print}" | sed 's/^ *//;s/\r$//'
          }
          
          NAME=$(extract_value "网站名称")
          DESC=$(extract_value "网站描述")
          URL=$(extract_value "网站链接")
          AVATAR=$(extract_value "网站头像 URL")
          FRIEND_URL=$(extract_value "友链页面 URL")
          
          [ "$NAME" = "No response" ] && NAME=""
          [ "$DESC" = "No response" ] && DESC=""
          [ "$URL" = "No response" ] && URL=""
          [ "$AVATAR" = "No response" ] && AVATAR=""
          [ "$FRIEND_URL" = "No response" ] && FRIEND_URL=""
          
          NAME=$(echo "$NAME" | sed 's/^`//;s/`$//')
          DESC=$(echo "$DESC" | sed 's/^`//;s/`$//')
          URL=$(echo "$URL" | sed 's/^`//;s/`$//')
          AVATAR=$(echo "$AVATAR" | sed 's/^`//;s/`$//')
          FRIEND_URL=$(echo "$FRIEND_URL" | sed 's/^`//;s/`$//')
          
          echo "提取结果: name=[$NAME] desc=[$DESC] url=[$URL] avatar=[$AVATAR] friend_url=[$FRIEND_URL]"
          
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "avatar=$AVATAR" >> $GITHUB_OUTPUT
          echo "friend_url=$FRIEND_URL" >> $GITHUB_OUTPUT

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 创建验证脚本
        run: |
          cat > verify.cjs << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          async function verify() {
            let verifyUrl = process.env.FRIEND_URL;
            if (verifyUrl) verifyUrl = verifyUrl.trim();
            
            if (!verifyUrl) {
              verifyUrl = process.env.SITE_URL;
              if (verifyUrl) verifyUrl = verifyUrl.trim();
            }

            if (!verifyUrl) {
              console.error('错误: 未提供验证 URL');
              fs.writeFileSync('/tmp/verify_result', 'fail');
              return;
            }

            console.log('正在检查:', verifyUrl);

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();

            try {
              await page.goto(verifyUrl, { 
                waitUntil: 'domcontentloaded',
                timeout: 30000 
              });

              const content = await page.content();
              console.log('实际访问地址:', page.url());

              const allLinks = await page.evaluate(() => {
                return Array.from(document.querySelectorAll('a[href]')).map(a => a.href);
              });
              const linksText = allLinks.join('\n');

              if (content.toLowerCase().includes('upxuu.com') || linksText.toLowerCase().includes('upxuu.com')) {
                console.log('✅ 验证通过：找到 upxuu.com');
                fs.writeFileSync('/tmp/verify_result', 'pass');
              } else {
                console.log('❌ 验证失败：未找到 upxuu.com');
                fs.writeFileSync('/tmp/verify_result', 'fail');
              }
            } catch (error) {
              console.error('访问失败:', error.message);
              fs.writeFileSync('/tmp/verify_result', 'fail');
            } finally {
              await browser.close();
            }
          }

          verify();
          EOF

      - name: 验证友链
        id: verify
        run: node verify.cjs
        env:
          SITE_URL: ${{ steps.extract.outputs.url }}
          FRIEND_URL: ${{ steps.extract.outputs.friend_url }}

      - name: 更新友链配置文件 (验证通过)
        if: steps.verify.outputs.result == 'pass'
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json, sys
          
          with open('public/data/friends.json', 'r', encoding='utf-8') as f:
            friends = json.load(f)
          
          name = """${{ steps.extract.outputs.name }}"""
          url = """${{ steps.extract.outputs.url }}"""
          
          for friend in friends:
            if friend['url'].rstrip('/') == url.rstrip('/'):
              print(f"友链已存在: {url}")
              sys.exit(0)
          
          new_friend = {
            "name": name,
            "url": url,
            "avatar": """${{ steps.extract.outputs.avatar }}""",
            "description": """${{ steps.extract.outputs.desc }}"""
          }
          friends.append(new_friend)
          
          with open('public/data/friends.json', 'w', encoding='utf-8') as f:
            json.dump(friends, f, ensure_ascii=False, indent=2)
          
          print("✅ 友链已添加")
          PYTHON_SCRIPT

      - name: 提交并推送 (验证通过)
        if: steps.verify.outputs.result == 'pass'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/friends.json
          
          if ! git diff --cached --quiet; then
            git commit -m "feat: 添加友链 ${{ steps.extract.outputs.name }}"
            git push
            echo "✅ 已提交并推送"
          else
            echo "友链已存在，无需更新"
          fi

      - name: 回复 Issue - 验证通过并关闭
        if: steps.verify.outputs.result == 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ 友链申请已通过！
              
              感谢申请！友链已成功添加到列表中。
              
              📋 **友链信息**
              - 名称：${{ steps.extract.outputs.name }}
              - 链接：${{ steps.extract.outputs.url }}
              
              ⚡ Vercel 将自动重新部署，几分钟内更新生效。
              
              感谢支持！🎉`
            })
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            })

      - name: 回复 Issue - 验证失败并关闭
        if: steps.verify.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ 友链申请未通过
              
              在你的网站中未找到 \`upxuu.com\`，请检查是否已正确添加本站友链。
              
              📝 **本站信息**
              - 名称: UpXuu
              - 链接: https://upxuu.com
              - 头像: https://upxuu.com/images/20260214145619.jpg
              
              如需重新申请，请修改后新建 Issue。`
            })
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            })
