name: 🤝 自动更新友链

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  update-friends:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 解析 Issue 并验证友链
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { chromium } = require('playwright');

            // 判断触发类型
            const isIssueOpen = context.eventName === 'issues' &&
              (context.payload.action === 'opened' || context.payload.action === 'reopened');
            const isComment = context.eventName === 'issue_comment';

            // 获取 issue 信息
            const issue = context.payload.issue;
            const body = issue.body || '';
            const isFriendRequest = body.includes('### 网站名称') && body.includes('### 网站链接');

            // 只有友链申请才处理
            if (!isFriendRequest) {
              console.log('非友链申请 issue，跳过');
              return;
            }

            // 评论触发时检查是否有 "重新验证" 的意图
            if (isComment) {
              const comment = context.payload.comment.body.trim().toLowerCase();
              const commenter = context.payload.comment.user.login;
              const isAuthor = comment.author === issue.user.login;
              const wantsRerun = comment.includes('重新验证') || comment.includes('retry') ||
                comment.includes('重新检查') || comment === '/verify';

              // 只有作者回复失败信息才重新验证
              if (!isAuthor || !wantsRerun) {
                console.log('评论不是来自作者或没有重新验证请求，跳过');
                return;
              }
              console.log('作者请求重新验证');
            }

            // 解析表单字段
            function extractField(name, text) {
              const regex = new RegExp(`### ${name}\\s*\\n([^#]+)`, 'i');
              const match = text.match(regex);
              return match ? match[1].trim() : null;
            }

            const name = extractField('网站名称', body);
            const url = extractField('网站链接', body);
            const friendUrl = extractField('友链页面 URL', body);
            const description = extractField('网站描述', body);
            const avatar = extractField('网站头像 URL', body) || '';

            if (!name || !url || !friendUrl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ 友链信息不完整，请确保填写了网站名称、网站链接和友链页面 URL。'
              });
              return;
            }

            const cleanUrl = url.replace(/\/$/, '');
            const cleanFriendUrl = friendUrl.replace(/\/$/, '');
            const cleanAvatar = avatar ? avatar.trim() : '';

            // 第一步：用 Playwright 测试友链页面（避免 403）
            console.log(`正在检查友链页面: ${cleanFriendUrl}`);
            const browser = await chromium.launch({ headless: true });
            const context_browser = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context_browser.newPage();

            let connError = null;
            let actualUrl = cleanFriendUrl;
            let pageTitle = '';
            let statusCode = null;

            try {
              const response = await page.goto(cleanFriendUrl, {
                waitUntil: 'domcontentloaded',
                timeout: 30000
              });
              actualUrl = page.url();
              pageTitle = await page.title();
              statusCode = response ? response.status() : null;

              if (!response.ok()) {
                connError = `HTTP ${statusCode}`;
              }
            } catch (e) {
              connError = e.message || '无法访问';
            }

            if (connError) {
              await browser.close();
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ 友链验证失败：**${name}**\n\n**失败原因**：友链页面无法访问\n- 链接: ${cleanFriendUrl}\n- 实际访问: ${actualUrl}\n- 状态码: ${statusCode || '无'}\n- 错误: ${connError}\n\n请确认友链页面是否可以正常访问。`
              });
              return;
            }

            // 第二步：检查友链页面是否包含 upxuu.com
            console.log(`正在检查友链: ${cleanFriendUrl}`);

            let hasFriendLink = false;
            let pageContent = '';

            try {
              const content = await page.content();
              pageContent = content;

              const allLinks = await page.evaluate(() => {
                return Array.from(document.querySelectorAll('a[href]')).map(a => a.href);
              });

              const linkText = allLinks.join('\n').toLowerCase();
              const contentLower = content.toLowerCase();

              hasFriendLink = contentLower.includes('upxuu.com') || linkText.includes('upxuu.com');

              console.log(`页面标题: ${pageTitle}`);
              console.log(`链接数量: ${allLinks.length}`);
              console.log(`找到 upxuu.com: ${hasFriendLink}`);

            } catch (e) {
              console.log(`检查友链时出错: ${e.message}`);
            }

            if (!hasFriendLink) {
              await browser.close();
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ 友链验证失败：**${name}**\n\n**失败原因**：未在网站中找到本站友链\n- 网站: ${actualUrl}\n- 标题: ${pageTitle}\n\n请先在你的网站添加本站友链：\n- **名称**: UpXuu\n- **链接**: https://upxuu.com\n- **头像**: https://upxuu.com/images/20260214145619.jpg\n- **描述**: 逐光而上\n\n---\n💡 添加友链后，回复「重新验证」即可重新检查。`
              });
              return;
            }

            // 第三步：验证通过，更新 friends.json
            await browser.close();

            const friendsPath = 'public/data/friends.json';
            let friends = [];

            if (fs.existsSync(friendsPath)) {
              friends = JSON.parse(fs.readFileSync(friendsPath, 'utf-8'));
            }

            const existingIndex = friends.findIndex(f => f.url.replace(/\/$/, '') === cleanUrl);

            if (existingIndex !== -1) {
              friends[existingIndex] = {
                name: name,
                url: cleanUrl,
                avatar: cleanAvatar,
                description: description || ''
              };
            } else {
              friends.push({
                name: name,
                url: cleanUrl,
                avatar: cleanAvatar,
                description: description || ''
              });
            }

            fs.writeFileSync(friendsPath, JSON.stringify(friends, null, 2) + '\n');

            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git pull origin main --rebase');
            execSync(`git add ${friendsPath}`);
            execSync(`git commit -m "🤝 更新友链: ${name}"`);
            execSync('git push');

            const action = existingIndex !== -1 ? '更新' : '添加';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ 你的网站 **${name}** (${cleanUrl}) 已成功添加到 UpXuu 的友链中啦~\n\n**友链信息**：\n- 名称: ${name}\n- 链接: ${cleanUrl}\n- 描述: ${description || '无'}\n- 头像: ${cleanAvatar || '无'}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });
