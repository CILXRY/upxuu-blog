name: Friend Link Checker

on:
  issues:
    types: [opened, edited]

jobs:
  process-friend-request:
    if: contains(github.event.issue.title, '友链申请')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run everything
        uses: actions/github-script@v7
        with:
          script: |
            const { chromium } = require('playwright');
            const fs = require('fs');
            const https = require('https');
            const http = require('http');

            const body = context.payload.issue.body;
            console.log('=== Issue Body ===');
            console.log(body);
            console.log('==================');

            function extract(key) {
              const pattern = new RegExp('### ' + key + '\\s*\\n\\s*(.*?)(?=\\n###|\\Z)', 's');
              const m = body.match(pattern);
              if (m) {
                let val = m[1].trim();
                if (val === 'No response') return '';
                return val.replace(/^`|`$/g, '');
              }
              return '';
            }

            const name = extract('网站名称');
            const desc = extract('网站描述');
            const url = extract('网站链接');
            const avatar = extract('网站头像 URL');
            const friendUrl = extract('友链页面 URL');

            console.log(`提取: name=[${name}] url=[${url}] friend_url=[${friendUrl}]`);

            const result = {
              site_url: url,
              friend_url: friendUrl || url,
              connectivity: null,
              friend_link_check: null,
              overall: 'fail'
            };

            if (!url) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ⚠️ 申请信息不完整\n\n请确保填写了**网站链接**（必填）。\n\n编辑此 Issue 补充信息后会自动重新验证。'
              });
              return;
            }

            // 连通性测试
            const checkConn = (u) => new Promise((resolve) => {
              const client = u.startsWith('https') ? https : http;
              const req = client.get(u, { timeout: 10000 }, (res) => {
                resolve({ ok: res.statusCode >= 200 && res.statusCode < 400, status: res.statusCode });
                res.resume();
              });
              req.on('error', (e) => resolve({ ok: false, error: e.message }));
              req.on('timeout', () => { req.destroy(); resolve({ ok: false, error: 'timeout' }); });
            });

            const verifyUrl = friendUrl || url;
            console.log('1. 连通性测试:', verifyUrl);
            const conn = await checkConn(verifyUrl);
            result.connectivity = conn;
            console.log('   结果:', conn.ok ? '可达' : '不可达', conn.error || '');

            if (conn.ok) {
              console.log('2. 浏览器验证');
              const browser = await chromium.launch({ headless: true });
              const context = await browser.newContext({
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              });
              const page = await context.newPage();

              try {
                await page.goto(verifyUrl, { waitUntil: 'domcontentloaded', timeout: 30000 });
                const content = await page.content();
                const allLinks = await page.evaluate(() =>
                  Array.from(document.querySelectorAll('a[href]')).map(a => a.href)
                );
                const found = (content + '\n' + allLinks.join('\n')).toLowerCase().includes('upxuu.com');
                result.friend_link_check = { found, actual_url: page.url() };
                console.log('   结果:', found ? '✅ 找到 upxuu.com' : '❌ 未找到');
              } catch (e) {
                console.error('   错误:', e.message);
                result.friend_link_check = { found: false, error: e.message };
              } finally {
                await browser.close();
              }
            }

            result.overall = (conn.ok && result.friend_link_check?.found) ? 'pass' : 'fail';
            console.log('最终结果:', result.overall);

            if (result.overall === 'pass') {
              // 读取并更新 friends.json
              const friendsPath = 'public/data/friends.json';
              const friends = JSON.parse(fs.readFileSync(friendsPath, 'utf-8'));

              const exists = friends.some(f => f.url.replace(/\/$/, '') === url.replace(/\/$/, ''));
              if (!exists) {
                friends.push({ name, url, avatar, description: desc });
                fs.writeFileSync(friendsPath, JSON.stringify(friends, null, 2), 'utf-8');
                console.log('✅ 友链已添加到 friends.json');

                // 提交
                const { execSync } = require('child_process');
                execSync('git config user.name "github-actions[bot]"');
                execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
                execSync('git add ' + friendsPath);
                if (execSync('git diff --cached --quiet', { encoding: 'utf-8' }) === '') {
                  // no changes
                } else {
                  try {
                    execSync(`git commit -m "feat: 添加友链 ${name}"`);
                    execSync('git push');
                    console.log('✅ 已推送');
                  } catch (e) {
                    console.error('推送失败:', e.message);
                  }
                }
              }

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ✅ 友链申请已通过！

📋 **友链信息**
- 名称：${name}
- 链接：${url}

🔍 **验证结果**
- 连通性：✅ 可达
- 友链验证：✅ 已找到 upxuu.com

⚡ Vercel 将自动部署更新，几分钟内生效。感谢支持！🎉`
              });
              await github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              });
            } else {
              const connText = conn.ok ? '✅ 可达' : `❌ 不可达 (${conn.error || '超时'})`;
              const linkText = result.friend_link_check?.found ? '✅ 已找到' : '❌ 未找到 upxuu.com';

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ❌ 友链申请未通过

🔍 **验证结果**
- 连通性：${connText}
- 友链验证：${linkText}
- 检测地址：${verifyUrl}

📝 **本站信息**
- 名称: UpXuu
- 链接: https://upxuu.com
- 头像: https://upxuu.com/images/20260214145619.jpg

请确认已在你的网站添加本站友链，然后编辑此 Issue 触发重新验证。`
              });
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['需处理']
              });
            }
