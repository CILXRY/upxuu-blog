name: 🔍 友链每日巡检

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  check-friends:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 创建巡检脚本
        run: |
          cat > cron-check.cjs << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const https = require('https');
          const http = require('http');

          async function checkConnectivity(url) {
            return new Promise((resolve) => {
              const client = url.startsWith('https') ? https : http;
              const req = client.get(url, { timeout: 10000 }, (res) => {
                resolve({ ok: res.statusCode >= 200 && res.statusCode < 400, status: res.statusCode });
                res.resume();
              });
              req.on('error', (e) => resolve({ ok: false, status: 0, error: e.message }));
              req.on('timeout', () => { req.destroy(); resolve({ ok: false, status: 0, error: 'timeout' }); });
            });
          }

          async function checkFriend(url) {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();
            let found = false;
            let actualUrl = url;
            try {
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
              const content = await page.content();
              actualUrl = page.url();
              const allLinks = await page.evaluate(() => {
                return Array.from(document.querySelectorAll('a[href]')).map(a => a.href);
              });
              found = content.toLowerCase().includes('upxuu.com') || allLinks.join('\n').toLowerCase().includes('upxuu.com');
            } catch (e) {
              found = false;
            } finally {
              await browser.close();
            }
            return { found, actual_url: actualUrl };
          }

          async function main() {
            const friends = JSON.parse(fs.readFileSync('public/data/friends.json', 'utf-8'));
            const results = [];

            for (const f of friends) {
              const skipNames = ['UpXuu'];
              if (skipNames.includes(f.name)) continue;

              const url = f.url.replace(/\/$/, '');
              console.log(`检查: ${f.name} - ${url}`);

              const conn = await checkConnectivity(url);
              let linkCheck = null;

              if (conn.ok) {
                linkCheck = await checkFriend(url);
              }

              const status = conn.ok && linkCheck?.found ? '✅' : (conn.ok ? '⚠️ 无友链' : '❌ 不可达');
              console.log(`  结果: ${status}`);
              results.push({
                name: f.name,
                url: url,
                reachable: conn.ok,
                hasLink: linkCheck?.found || false,
                error: !conn.ok ? conn.error : null
              });

              await new Promise(r => setTimeout(r, 1000));
            }

            fs.writeFileSync('/tmp/cron_results.json', JSON.stringify(results, null, 2));
            
            const total = results.length;
            const ok = results.filter(r => r.reachable && r.hasLink).length;
            const warn = results.filter(r => r.reachable && !r.hasLink).length;
            const fail = results.filter(r => !r.reachable).length;
            console.log(`总计: ${total} | 正常: ${ok} | 缺友链: ${warn} | 不可达: ${fail}`);
          }

          main();
          EOF

      - name: 执行巡检
        id: check
        run: node cron-check.cjs

      - name: 发送巡检报告
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('/tmp/cron_results.json', 'utf-8'));
            
            const total = results.length;
            const ok = results.filter(r => r.reachable && r.hasLink).length;
            const warn = results.filter(r => r.reachable && !r.hasLink).length;
            const fail = results.filter(r => !r.reachable).length;

            let body = `## 🔍 友链每日巡检报告
            
            📊 **总览**
            - 检测总数：${total}
            - ✅ 正常：${ok}
            - ⚠️ 缺友链：${warn}
            - ❌ 不可达：${fail}
            
            ---
            `;

            if (fail > 0) {
              body += `### ❌ 不可达的友链\n\n`;
              results.filter(r => !r.reachable).forEach(r => {
                body += `- **${r.name}** - ${r.url}\n  - 原因: ${r.error}\n`;
              });
              body += '\n';
            }

            if (warn > 0) {
              body += `### ⚠️ 未找到本站友链\n\n`;
              results.filter(r => r.reachable && !r.hasLink).forEach(r => {
                body += `- **${r.name}** - ${r.url}\n`;
              });
              body += '\n';
            }

            if (fail === 0 && warn === 0) {
              body += `🎉 所有友链状态正常！\n`;
            }

            body += `\n_检测时间: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}_`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 友链巡检报告 ${new Date().toLocaleDateString('zh-CN')}`,
              body: body,
              labels: ['自动巡检']
            });
            console.log('巡检报告已发布');
